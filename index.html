<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tostr: Code Context Engine for AI Agents</title>

    <style>
      html { background-color: #292624; color: #ffffff; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Jersey+20&family=Kode+Mono:wght@400..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/src/style.css">
  </head>
  
  <body class="text-white min-h-screen">
    <!-- HEADER -->
    <header class="bg-transparent w-full mx-auto py-6 px-6 flex justify-between items-center">
      <div class="flex items-left space-x-4">
        <img src="/src/assets/logo.png" alt="Tostr Logo" class="w-[15rem] h-[3.125rem]">
      </div>
      <div class="flex items-right space-x-4">
        <a href="https://github.com/rubytanuki/tostr"><img src="/src/assets/github.svg" alt="GitHub Logo" class="w-[4rem] h-[3.9375rem]"></a>
      </div>
    </header>

    <main class="mx-16 mt-10 px-16 lg:px-8 pt-4 pb-16 gap-4 items-center">
      <!-- HERO -->
      <div class="flex items-center gap-8 mt-6">
        <!-- Left -->
        <div class="w-3/5 text-left">
          <div class=" font-pixel-small text-[2.625rem] text-tostr-tan mb-[-1.5rem]">
            Stop forcing AI to use grep.
          </div>
          <div class="font-pixel-large text-[3.5rem] text-tostr-light text-bouncy">
            CODE CONTEXT BUILT FOR AGENTS
          </div>
          <div class="font-kode-mono font-regular  text-[1.25rem] text-tostr-text-medium">
            Modern agent frameworks still navigate code using</br>
            tools built for humans; Tostr reframes codebase</br>
            exploration with <b class="text-tostr-text-medium-light">agentic programmers as the first-class user.</b></br>
          </div>
          <div class="flex justify-start items-center space-x-4 mt-8 text-center">
            <div class="w-[15.625rem] h-[3.75rem] btn-tostr-solid"><a href="https://github.com/rubytanuki/tostr">Go to Github</a></div>
            <div class="w-[15.625rem] h-[3.75rem] btn-tostr-outline">Read the docs</div>
          </div>
        </div>

        <!-- Right -->
        <div class="w-2/5 flex justify-center items-center">
          <video src="/demo.webm" width="960" height="750" autoplay loop muted playsinline
            class="w-[30rem] max-w-full h-auto outline-[0.125rem] -outline-offset-[0.125rem] outline-[#2A2B2D] rounded-[0.5rem]"></video>
        </div>
      </div>

    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
